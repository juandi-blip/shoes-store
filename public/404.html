<!doctype html>
<!--
  Fallback SPA para GitHub Pages: es un servidor de archivos estáticos sin
  reescritura de rutas, así que una URL profunda (ej. /shoes-store/catalogo)
  devuelve este 404.html. Codifica la ruta pedida en la query string y
  redirige a index.html; el script en <head> de index.html la decodifica y
  restaura la URL real con history.replaceState antes de montar React Router.
  Patrón estándar: https://github.com/rafgraph/spa-github-pages
-->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Shoes Store</title>
    <script>
      // pathSegmentsToKeep = 1 porque el sitio vive en /shoes-store/ (project page)
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
