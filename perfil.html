<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perfil de usuario en Shoes Store">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="inicioRegistro.css">
  <title>Mi Perfil — Shoes Store</title>
</head>
<body>

  <main>
    <div class="card">
      <nav class="top-nav" aria-label="Navegación superior">
        <a href="index.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Tienda
        </a>
      </nav>

      <a href="index.html" class="brand-tag">SHOES<span class="brand-dot">.</span>STORE</a>

      <div class="profile-header">
        <img src="icono perfil.avif" alt="Avatar del usuario" class="profile-avatar">
        <h1 class="text1">Mi Perfil</h1>
        <h2 class="text2">Gestiona tu información personal</h2>
      </div>
      
      <form>
        <div class="form">
          <label for="username">Nombre de usuario</label>
          <input id="username" type="text" value="PremiumSneakerhead" readonly>
        </div>
        
        <div class="form">
          <label for="birthdate">Fecha de nacimiento</label>
          <input id="birthdate" type="date" value="1998-05-15" readonly>
        </div>
      </form>
      
      <button type="button" onclick="window.location.href='inicio.html'" class="btn1" style="background-color: transparent; border: 1px solid var(--color-border-hover); color: var(--color-text-secondary); margin-top: 2rem;">
        Cerrar sesión
      </button>
    </div>
  </main>

</body>
</html>
