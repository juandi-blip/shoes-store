<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iniciar sesión en Shoes Store">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="inicioRegistro.css">
  <title>Iniciar Sesión — Shoes Store</title>
</head>
<body>

  <main>
    <div class="card">
      <nav class="top-nav" aria-label="Navegación superior">
        <a href="index.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Volver
        </a>
      </nav>

      <a href="index.html" class="brand-tag">SHOES<span class="brand-dot">.</span>STORE</a>

      <h1 class="text1">Bienvenido de nuevo</h1>
      <h2 class="text2">Inicia sesión en tu cuenta para continuar</h2>
      
      <form id="login-form" novalidate>
        <div class="form">
          <label for="user">Nombre de usuario</label>
          <input id="user" type="text" placeholder="Ingresa tu usuario" required>
        </div>
        
        <div class="form">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="Ingresa tu contraseña" required>
        </div>
        
        <button type="submit" class="btn1">Iniciar sesión</button>

        <div id="login-error" class="login-error" role="alert" aria-live="polite"></div>
      </form>
      
      <div class="auth-link">
        <a href="registro.html">¿No tienes una cuenta? Regístrate</a>
      </div>
    </div>
  </main>

  <script src="js/login.js"></script>

</body>
</html>
